<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        /* Navbar */
        .navbar {
            background-color: #2c3e50;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
            padding: 8px 12px;
        }

        .navbar a.active {
            background-color: #3498db;
            border-radius: 5px;
        }

        .navbar a:hover {
            background-color: #1abc9c;
            border-radius: 5px;
        }

        /* Contact Container */
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .contact-info {
            margin-top: 20px;
            line-height: 1.8;
            font-size: 16px;
        }

        .contact-info p {
            margin: 10px 0;
        }

        .contact-info strong {
            color: #34495e;
        }

        /* Form Styling */
        .contact-form {
            margin-top: 30px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="books.html">Books</a>
        <a href="contact.html" class="active">Contact Us</a>
    </div>

    <!-- Contact Section -->
    <div class="container">
        <h1>Contact Us</h1>

        <div class="contact-info">
            <p><strong>Address:</strong> 123 Knowledge Street, Pune, Maharashtra, India</p>
            <p><strong>Phone:</strong> +91 98765 43210</p>
            <p><strong>Email:</strong> support@bookreviewapp.com</p>
            <p><strong>Working Hours:</strong> Mon - Fri (9:00 AM - 6:00 PM)</p>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
            <h3>Send us a message</h3>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

</body>
</html>
